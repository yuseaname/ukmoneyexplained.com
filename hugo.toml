baseURL = 'https://ukmoneyexplained.com/'
languageCode = 'en-gb'
title = 'UK Money Explained'
theme = 'adsense-base'

[params]
  site_name = 'UK Money Explained'
  description = "Clear, jargon-free explanations of UK finance topics — credit scores, mortgages, taxes, bills, and more."
  tagline = "Simple explanations of money, bills, taxes, and finance in the UK."
  author = "UK Money Explained"
  favicon = '/images/og-default.png'
  og_image = '/images/og-default.png'
  google_site_verification = ''

  [params.adsense]
    client_id = 'ca-pub-5566942094411042'
    [params.adsense.slots]
      below_title = { id = '9770352885', format = 'auto', responsive = 'true' }
      after_intro = { id = '', format = 'auto', responsive = 'true' }
      mid_article = { id = '7429084400', format = 'auto', responsive = 'true' }
      end_article = { id = '3364726638', format = 'auto', responsive = 'true' }
      sidebar = { id = '', format = 'vertical', responsive = 'true' }

[taxonomies]
  category = 'categories'
  tag = 'tags'

[permalinks]
  [permalinks.page]
    credit = '/:filename/'
    debt = '/:filename/'
    loans = '/:filename/'
    mortgages = '/:filename/'
    taxes = '/:filename/'
    bills = '/:filename/'
    tools = '/:filename/'

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = 'weekly'
  filename = 'sitemap.xml'
  priority = 0.5

[outputs]
  home = ['HTML', 'RSS']

[menus]
  [[menus.main]]
    name = "Credit & Debt"
    url = "/credit/"
    weight = 10
  [[menus.main]]
    name = "Loans"
    url = "/loans/"
    weight = 20
  [[menus.main]]
    name = "Mortgages"
    url = "/mortgages/"
    weight = 30
  [[menus.main]]
    name = "Taxes"
    url = "/taxes/"
    weight = 40
  [[menus.main]]
    name = "Bills"
    url = "/bills/"
    weight = 50
  [[menus.main]]
    name = "Tools"
    url = "/tools/"
    weight = 60

  [[menus.footer]]
    name = "About"
    url = "/about/"
    weight = 10
  [[menus.footer]]
    name = "Editorial Policy"
    url = "/editorial-policy/"
    weight = 20
  [[menus.footer]]
    name = "Contact"
    url = "/contact/"
    weight = 30
