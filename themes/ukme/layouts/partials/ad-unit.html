{{ if site.Params.adsense_enabled }}
<div class="ad-unit ad-{{ .position }}" aria-hidden="true">
  <ins class="adsbygoogle"
    style="display:block"
    data-ad-client="{{ site.Params.adsense_client }}"
    data-ad-slot="{{ index site.Params (printf "adsense_slot_%s" .position) }}"
    data-ad-format="auto"
    data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
{{ end }}
