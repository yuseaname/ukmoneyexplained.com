# UK Money Explained — Nginx Configuration for Hostinger Cloud Startup
# Place this in /etc/nginx/sites-available/ or include from nginx.conf

server {
    listen 80;
    server_name ukmoneyexplained.com www.ukmoneyexplained.com;
    return 301 https://ukmoneyexplained.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.ukmoneyexplained.com;

    # SSL certs managed by Hostinger/Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/ukmoneyexplained.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ukmoneyexplained.com/privkey.pem;

    return 301 https://ukmoneyexplained.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ukmoneyexplained.com;

    # SSL certs managed by Hostinger/Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/ukmoneyexplained.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ukmoneyexplained.com/privkey.pem;

    root /home/your-user/public_html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Cache static assets (fingerprinted by Hugo — safe to cache long)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache HTML pages (short — content updates frequently)
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Sitemap and robots.txt
    location = /sitemap.xml {
        expires 1d;
    }
    location = /robots.txt {
        expires 1d;
    }

    # Clean URLs — Hugo generates /page/index.html, Nginx serves as /page/
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Custom 404
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
