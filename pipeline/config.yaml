# Pipeline configuration for UK Money Explained content generation
# Ollama API settings (EvoX2 tunnel)
ollama:
  base_url: "http://127.0.0.1:11435/v1"
  model: "qwen3.5:27b-64k"
  temperature: 0.3
  max_tokens: 32768
  timeout: 600  # seconds — 10 min per article

# Content settings
content:
  output_dir: "content"
  min_words: 1500
  max_words: 2500
  date_format: "%Y-%m-%dT%H:%M:%S+00:00"

# Generation settings
generation:
  delay_between_articles: 5  # seconds
  max_retries: 3
  retry_delay: 30  # seconds — for cold-start recovery
  dry_run: false

# Site metadata (injected into prompts)
site:
  name: "UK Money Explained"
  url: "https://ukmoneyexplained.com"
  disclaimer: "This is for informational purposes only and does not constitute financial advice. Consult a qualified financial adviser for personal advice."
